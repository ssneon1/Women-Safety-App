name: women_safety_app
description: Women Safety App with SOS features
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Location & Maps
  geolocator: ^10.1.0

  # State Management
  provider: ^6.1.1
  shared_preferences: ^2.2.2

  # UI Components
  url_launcher: ^6.2.1
  flutter_phone_direct_caller: ^2.1.1
  telephony: ^0.2.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true